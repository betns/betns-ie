<!doctype html>                                                                                                                                                                                                                                                                          
<html lang="{{ site.LanguageCode | default "en" }}">                                                                                                                                                                                                                                     
<head>                                                                                                                                                                                                                                                                                   
  <meta charset="utf-8">                                                                                                                                                                                                                                                                 
  <meta name="viewport" content="width=device-width, initial-scale=1">                                                                                                                                                                                                                   
  <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} · {{ site.Title }}{{ end }}</title>
  {{ with site.Params.description }}<meta name="description" content="{{ . }}">{{ end }}                                                                                                                                                                                                 
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">                                                                                                                                                                                 
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">                                                                                                                                                                        
  <style>                                                                                                                                                                                                                                                                                
    /* Brand palette — match the original Understrap-on-WP site. */                                                                                                                                                                                                                      
    :root {                                                                                                                                                                                                                                                                              
      --bs-primary: #5533ff;                              
      --bs-primary-rgb: 85, 51, 255;                                                                                                                                                                                                                                                     
    }                                                                                                                                                                                                                                                                                    
    body { display: flex; flex-direction: column; min-height: 100vh; }
    main { flex: 1 0 auto; }                                                                                                                                                                                                                                                             
    .site-header .navbar-brand { font-weight: 600; display: flex; align-items: center; gap: 0.75rem; color: #fff; }                                                                                                                                                                      
    .site-header .navbar-brand img { height: 44px; width: auto; border-radius: 4px; }                                                                                                                                                                                                    
    .site-header .navbar-brand:hover, .site-header .navbar-brand:focus { color: #fff; }                                                                                                                                                                                                  
    .site-header .dropdown-menu .dropdown-item.active,                                                                                                                                                                                                                                   
    .site-header .dropdown-menu .dropdown-item:active { background-color: var(--bs-primary); }
    .featured-image { max-height: 360px; object-fit: cover; width: 100%; border-radius: 0.5rem; margin-bottom: 1.5rem; }                                                                                                                                                                 
                                                                                                                                                                                                                                                                                          
    /* Content images: cap at column width by default; inline width/height                                                                                                                                                                                                               
        attributes from the WP source still take precedence. */                                                                                                                                                                                                                           
    .content img { max-width: 100%; height: auto; }                                                                                                                                                                                                                                      
    .content figure { margin: 1.5rem 0; }                                                                                                                                                                                                                                                
    .content figure img { display: block; max-width: 100%; height: auto; }
    .content .wp-block-image { display: inline-block; }                                                                                                                                                                                                                                  
                                                          
    /* ---- render-hook variants ---- */                                                                                                                                                                                                                                                 
    .img-banner { margin: 0 0 1.5rem; }                   
    .img-banner img { width: 100%; max-height: 260px; object-fit: cover; border-radius: 0.5rem; }                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                          
    .img-strike {                                                                                                                                                                                                                                                                        
      float: right; max-width: 50%; height: 350px;                                                                                                                                                                                                                                       
      border-radius: 20px; overflow: hidden;              
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);                                                                                                                                                                                                                                           
      margin: 0 0 1.5rem 1.5rem;
    }                                                                                                                                                                                                                                                                                    
    .img-strike img { width: 100%; height: 100%; object-fit: cover; }
    @media (max-width: 768px) {                                                                                                                                                                                                                                                          
      .img-strike { float: none; margin: 1em auto; max-width: 100%; height: 220px; }
    }                                                                                                                                                                                                                                                                                    
                                                          
    .img-icon {                                                                                                                                                                                                                                                                          
      display: inline-block; vertical-align: middle;      
      max-height: 48px; width: auto; margin-right: 0.5rem;
    }                                                                                                                                                                                                                                                                                    
  
    .img-thumb {                                                                                                                                                                                                                                                                         
      float: left; max-width: 220px; margin: 0 1rem 0.75rem 0;
      border-radius: 0.375rem;
    }                                                                                                                                                                                                                                                                                    
    .img-thumb img { border-radius: 0.375rem; }
    @media (max-width: 576px) {                                                                                                                                                                                                                                                          
      .img-thumb { float: none; max-width: 100%; margin: 0 0 1rem; }
    }                                                                                                                                                                                                                                                                                    
  
    .img-center { text-align: center; }                                                                                                                                                                                                                                                  
    .img-center img { margin: 0 auto; max-width: 100%; }  
    .img-center figcaption { margin-top: 0.5rem; font-size: 0.9rem; color: #6c757d; }
                                                                                                                                                                                                                                                                                          
    .content .table { display: table; width: auto; }
    footer { background: #f1f3f5; }                                                                                                                                                                                                                                                      
    footer .footer-logo { max-height: 80px; width: auto; }                                                                                                                                                                                                                               
    @media (max-width: 767.98px) { footer .footer-logo { max-height: 64px; } }
  </style>                                                                                                                                                                                                                                                                               
</head>                                                   
<body>                                                                                                                                                                                                                                                                                   
  {{ partial "header.html" . }}                           
  <main class="container py-4">
    {{ block "main" . }}{{ end }}
  </main>                                                                                                                                                                                                                                                                                
  {{ partial "footer.html" . }}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>                                                                                                                                                                                   
</body>                                                                                                                                                                                                                                                                                  
</html>
