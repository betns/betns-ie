<!doctype html>
<html lang="{{ site.LanguageCode | default "en" }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} · {{ site.Title }}{{ end }}</title>
  {{ with site.Params.description }}<meta name="description" content="{{ . }}">{{ end }}
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    main { flex: 1 0 auto; }
    .site-header .navbar-brand { font-weight: 600; }
    .featured-image { max-height: 360px; object-fit: cover; width: 100%; border-radius: 0.5rem; margin-bottom: 1.5rem; }

    /* Content images: don't blow past the column width, but don't force-stretch
       small icons either. Inline width/height attributes from the WP source
       still take precedence. */
    .content img { max-width: 100%; height: auto; }
    .content figure { margin: 1.5rem 0; }
    .content figure img { display: block; max-width: 100%; height: auto; }

    /* Staff icons (oak, elm, etc.) sit inline at the start of each <li>. */
    .content ul li > img:first-child { display: inline-block; vertical-align: middle; max-height: 56px; width: auto; margin-right: 0.5rem; }

    /* WP block: file/download links — don't try to make these full-width. */
    .content .wp-block-image { display: inline-block; }

    /* The "strike-image" figure used on the homepage — recreates the WP rules
       that lived in an inline <style> block we strip during conversion. */
    .strike-image {
      float: right;
      max-width: 50%;
      height: 350px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      margin: 0 0 1.5rem 1.5rem;
    }
    .strike-image img { width: 100%; height: 100%; object-fit: cover; display: block; }
    @media (max-width: 768px) {
      .strike-image { float: none; margin: 1em auto; max-width: 100%; height: 220px; }
    }

    .content .table { display: table; width: auto; }
    footer { background: #f1f3f5; }
  </style>
</head>
<body>
  {{ partial "header.html" . }}
  <main class="container py-4">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
