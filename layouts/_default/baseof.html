<!doctype html>
<html lang="{{ site.LanguageCode | default "en" }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} · {{ site.Title }}{{ end }}</title>
  {{ with site.Params.description }}<meta name="description" content="{{ . }}">{{ end }}
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    main { flex: 1 0 auto; }
    .site-header .navbar-brand { font-weight: 600; }
    .featured-image { max-height: 360px; object-fit: cover; width: 100%; border-radius: 0.5rem; margin-bottom: 1.5rem; }
    article img { max-width: 100%; height: auto; }
    article .table { display: table; width: auto; }
    footer { background: #f1f3f5; }
  </style>
</head>
<body>
  {{ partial "header.html" . }}
  <main class="container py-4">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
