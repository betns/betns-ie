<footer class="mt-5 py-4">
  <div class="container">
    <div class="row gy-3 align-items-center">
      <div class="col-md-8">
        <h2 class="h6 mb-2">{{ site.Params.schoolName | default site.Title }}</h2>
        <address class="mb-2">
          {{ with site.Params.address }}{{ . }}<br>{{ end }}
          {{ with site.Params.phone }}<i class="bi bi-telephone"></i>
            <a href="tel:{{ site.Params.phoneTel }}">{{ . }}</a><br>{{ end }}
          {{ with site.Params.email }}<i class="bi bi-envelope"></i>
            <a href="mailto:{{ . }}">{{ . }}</a>{{ end }}
        </address>
        <small class="text-muted d-block">© {{ now.Year }} {{ site.Params.schoolName | default site.Title }}.</small>
      </div>
      <div class="col-md-4 text-md-end">
        <a href="https://www.educatetogether.ie/" target="_blank" rel="noopener" class="d-inline-block">
          <img src="{{ "/uploads/2025/08/Educate-Together.png" | relURL }}"
                alt="Educate Together"
                class="footer-logo">
        </a>
      </div>
    </div>
  </div>
</footer>
