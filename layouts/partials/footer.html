<footer class="mt-5 py-4">
  <div class="container">
    <div class="row gy-3">
      <div class="col-md-6">
        <h5 class="h6">{{ site.Params.schoolName | default site.Title }}</h5>
        <address class="mb-0">
          {{ with site.Params.address }}{{ . }}<br>{{ end }}
          {{ with site.Params.phone }}<i class="bi bi-telephone"></i>
            <a href="tel:{{ site.Params.phoneTel }}">{{ . }}</a><br>{{ end }}
          {{ with site.Params.email }}<i class="bi bi-envelope"></i>
            <a href="mailto:{{ . }}">{{ . }}</a>{{ end }}
        </address>
      </div>
      <div class="col-md-6 text-md-end">
        <small class="text-muted">© {{ now.Year }} {{ site.Params.schoolName | default site.Title }}.</small>
      </div>
    </div>
  </div>
</footer>
