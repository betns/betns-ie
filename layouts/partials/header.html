<header class="site-header">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="{{ "/" | relURL }}">
        <img src="{{ "/uploads/2025/02/cropped-BETNS-75.jpg" | relURL }}" alt="" aria-hidden="true">
        <span class="d-none d-md-inline">{{ site.Title }}</span>
        <span class="d-inline d-md-none">BETNS</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#main-nav"
              aria-controls="main-nav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="main-nav">
        <ul class="navbar-nav ms-auto">
          {{ range site.Menus.main }}
            {{ if .HasChildren }}
              <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle{{ if $.IsMenuCurrent "main" . }} active{{ end }}"
                    href="{{ .URL | relURL }}" id="nav-{{ .Identifier }}" role="button"
                    data-bs-toggle="dropdown" aria-expanded="false">{{ .Name }}</a>
                <ul class="dropdown-menu" aria-labelledby="nav-{{ .Identifier }}">
                  {{ range .Children }}
                    <li><a class="dropdown-item{{ if $.IsMenuCurrent "main" . }} active{{ end }}"
                            href="{{ .URL | relURL }}">{{ .Name }}</a></li>
                  {{ end }}
                </ul>
              </li>
            {{ else }}
              <li class="nav-item">
                <a class="nav-link{{ if $.IsMenuCurrent "main" . }} active{{ end }}"
                    href="{{ .URL | relURL }}">{{ .Name }}</a>
              </li>
            {{ end }}
          {{ end }}
        </ul>
      </div>
    </div>
  </nav>
</header>
