{{ define "main" }}
<article class="mx-auto" style="max-width: 820px;">
  <header class="mb-4">
    <h1>{{ .Title }}</h1>
  </header>
  <div class="content">
    {{ .Content }}
    <ul>
      {{ range resources.Match "policies/**/*" }}
        <li><a href="{{ .RelPermalink }}">{{ path.Base .Name }}</a></li>
      {{ end }}
    </ul>
  </div>
</article>
{{ end }}
